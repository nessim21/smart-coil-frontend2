<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Bienvenue, {{ username }}!</h1>
    <button class="logout-btn" (click)="logout()">Déconnexion</button>
  </div>
  
  <div class="dashboard-content">
    <div class="welcome-card">
      <h2>Dashboard - Page d'accueil</h2>
      <p>Bienvenue dans le système SmartCoil. Vous êtes maintenant connecté.</p>
      
            
      <div class="info-grid">
        <div class="info-item">
          <h3>Statut du système</h3>
          <p class="status">En ligne</p>
        </div>
        <div class="info-item">
          <h3>Dernière connexion</h3>
          <p>{{ currentDate | date:'short' }}</p>
        </div>
        <div class="info-item">
          <h3>Version</h3>
          <p>1.0.0</p>
        </div>
      </div>
    </div>
  </div>
</div>
